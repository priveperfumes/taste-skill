# 🚀 Auto-Deploy + 🐾 Verify Trigger
# When a PR is merged to main:
# 1. Deploys to Fly.io (if repo has Dockerfile/fly.toml)
# 2. Reports deploy status to PR + linked Linear issue
# 3. Triggers 🐾 Verifier via OpenAI API to smoke-test the deployment
#
# Install on: ALL prive-hn/* repos (org-level default)
# New repos inherit automatically. Repos without Dockerfile/fly.toml are skipped.
#
# ORG-LEVEL SECRETS NEEDED:
#   FLY_API_TOKEN — for Fly.io deploy
#   OPENAI_API_KEY — for verifier agent API call
#   LINEAR_API_KEY — for Linear status update (optional)
#
# NOTE: FLY_API_TOKEN should be set as an ORG-LEVEL secret so new repos
# automatically inherit it without manual configuration per repo.

name: Auto Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if deployable
        id: check
        run: |
          if [ -f "Dockerfile" ] || [ -f "fly.toml" ]; then
            echo "deployable=true" >> $GITHUB_OUTPUT

            # Extract Fly app name from fly.toml if possible
            if [ -f "fly.toml" ]; then
              APP=$(grep -m1 '^app\s*=' fly.toml | head -1 | sed "s/.*=.*['\"]//;s/['\"].*//" || echo "")
              echo "fly_app=$APP" >> $GITHUB_OUTPUT
            fi
          else
            echo "deployable=false" >> $GITHUB_OUTPUT
            echo "fly_app=" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Fly.io
        if: steps.check.outputs.deployable == 'true'
        id: fly_deploy
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - run: flyctl deploy --remote-only --ha=false
        if: steps.check.outputs.deployable == 'true'
        id: flyctl
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        continue-on-error: true

      - name: Determine deploy result
        id: result
        if: steps.check.outputs.deployable == 'true'
        run: |
          if [ "${{ steps.flyctl.outcome }}" = "success" ]; then
            echo "deploy_status=success" >> $GITHUB_OUTPUT
          else
            echo "deploy_status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Report to PR (deployable repo)
        if: steps.check.outputs.deployable == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request.number;
            const status = '${{ steps.result.outputs.deploy_status }}';
            const fly_app = '${{ steps.check.outputs.fly_app }}';
            const pr_title = context.payload.pull_request.title;
            const pr_body = (context.payload.pull_request.body || '').substring(0, 500);

            const body = status === 'success'
              ? `🚀 Deployed to Fly.io${fly_app ? ` (app: ${fly_app})` : ''}\n\n**What deployed:** PR #${pr_number} — ${pr_title}\n**Change:** ${pr_body.substring(0, 200)}\n\n🐾 Verifier will confirm health shortly.`
              : `🚀 Deploy FAILED — needs manual investigation.\n\n**What was supposed to deploy:** PR #${pr_number} — ${pr_title}\n\nCheck the [GitHub Actions log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body
            });

      - name: Report to PR (code-only repo)
        if: steps.check.outputs.deployable == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request.number;
            const pr_title = context.payload.pull_request.title;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body: `🚀 No deployment — this is a code-only repo (no Dockerfile/fly.toml).\n\n**What merged:** PR #${pr_number} — ${pr_title}\n\nCode is on GitHub. 🐾 Verifier will confirm.`
            });

      # Trigger 🐾 Verifier agent via OpenAI API (only for deployable repos)
      - name: Trigger Verifier Agent
        if: steps.check.outputs.deployable == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          FLY_APP="${{ steps.check.outputs.fly_app }}"
          DEPLOY_STATUS="${{ steps.result.outputs.deploy_status }}"

          # Wait for app startup
          sleep 60

          # Build the verifier prompt
          python3 -c "
          import json
          prompt = '''You are 🐾 Verifier for Privé Perfumes.

          A deploy just completed. Verify it.

          Repo: $REPO
          PR: #$PR_NUMBER — $PR_TITLE
          Fly app: $FLY_APP
          Deploy status: $DEPLOY_STATUS

          Steps:
          1. Try GET https://\${FLY_APP}.prive-hn.com/health (or the repo name as subdomain)
          2. Try GET https://\${FLY_APP}.prive-hn.com/
          3. If both return 200 → healthy
          4. If not → retry once after 30s
          5. Report result

          Format your response as exactly:
          🐾 Deploy Verified — [repo]
          ✅ or ❌ for each check
          **What deployed:** PR #\${PR_NUMBER} — \${PR_TITLE}
          '''
          with open('/tmp/verify-prompt.json', 'w') as f:
            json.dump({
              'model': 'gpt-4o',
              'messages': [{'role': 'user', 'content': prompt}],
              'max_tokens': 500,
              'temperature': 0.1
            }, f)
          "

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/verify-prompt.json 2>/dev/null || echo "{}")

          VERIFY_COMMENT=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            print(d['choices'][0]['message']['content'])
          except:
            print('🐾 Verification attempted — could not reach agent API')
          " 2>/dev/null || echo "🐾 Verification attempted — agent unreachable")

          # Post to GitHub PR
          gh issue comment "$PR_NUMBER" -R "$REPO" -b "$VERIFY_COMMENT" 2>/dev/null || true

      # Update Linear issue (if LINEAR_API_KEY secret exists)
      - name: Update Linear issue
        if: steps.check.outputs.deployable == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          DEPLOY_STATUS="${{ steps.result.outputs.deploy_status }}"

          # Extract Linear identifier (PRV-XXX)
          IDENTIFIER=$(echo "$PR_TITLE $PR_BODY" | grep -oP 'PRV-\d+' | head -1)
          if [ -z "$IDENTIFIER" ]; then
            echo "No Linear identifier found in PR, skipping Linear update"
            exit 0
          fi

          # Query Linear for the issue
          ISSUE_RESPONSE=$(curl -s https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issues(filter: { identifier: { eq: \\\"$IDENTIFIER\\\" } }) { nodes { id state { name } } } }\"}")

          ISSUE_ID=$(echo "$ISSUE_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); nodes=d['data']['issues']['nodes']; print(nodes[0]['id'] if nodes else '')" 2>/dev/null)

          if [ -z "$ISSUE_ID" ]; then
            echo "Could not find Linear issue $IDENTIFIER"
            exit 0
          fi

          # Update state to Done (if deploy succeeded)
          if [ "$DEPLOY_STATUS" = "success" ]; then
            curl -s https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation(\$id: String!, \$stateId: String!) { issueUpdate(id: \$id, input: { stateId: \$stateId }) { success } }\", \"variables\": {\"id\": \"$ISSUE_ID\", \"stateId\": \"af811b11-9d25-424e-800e-3d6dd02da5b8\"}}"
            echo "Linear issue $IDENTIFIER moved to Done"
          fi
