# 🔀 Auto-Merge + ✅ QA Trigger
# When CI passes on a PR that has a 🔍 clean review, this workflow:
# 1. Calls the QA ChatGPT Agent via OpenAI API to interpret CI results
# 2. If QA passes → auto-squash-merges the PR
# 3. Reports deploy-readiness
#
# This replaces both the old auto-merge and QA trigger workflows.
# Install on: ALL prive-hn/* repos (org-level default)
#
# ORG-LEVEL SECRETS NEEDED:
#   OPENAI_API_KEY — for QA agent API call
#   GITHUB_TOKEN — auto-provided by GitHub Actions

name: Auto Merge

on:
  check_suite:
    types: [completed]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: write

jobs:
  auto-merge:
    # Only trigger on same-repo PRs, not drafts, not bot comments
    if: >
      (github.event_name == 'check_suite' && github.event.check_suite.pull_requests[0] != null) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != '' && contains(github.event.comment.body, '✅'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          result-encoding: json
          script: |
            let pr_number;
            if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite.pull_requests;
              if (!prs.length) return JSON.stringify({skip: true});
              pr_number = prs[0].number;
            } else {
              pr_number = context.payload.issue.number;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            if (pr.draft || pr.merged) return JSON.stringify({skip: true});

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              per_page: 100
            });

            const hasCleanReview = comments.some(c =>
              c.body.includes('🔍') && c.body.includes('✅ Clean')
            );
            const hasQAPass = comments.some(c =>
              c.body.includes('✅ QA Passed')
            );
            const hasBlocking = comments.some(c =>
              c.body.includes('🔍') && (c.body.includes('🛑') || c.body.includes('⚠️ Needs fixes'))
            );

            return JSON.stringify({
              skip: false,
              pr_number,
              head_sha: pr.head.sha,
              head_ref: pr.head.ref,
              title: pr.title,
              hasCleanReview,
              hasQAPass,
              hasBlocking,
              body: (pr.body || '').substring(0, 500)
            });

      - name: Parse PR info
        if: steps.pr.outputs.result
        id: info
        run: |
          echo '${{ steps.pr.outputs.result }}' > /tmp/pr.json
          SKIP=$(python3 -c "import json; d=json.load(open('/tmp/pr.json')); print(d.get('skip', False))")
          if [ "$SKIP" = "True" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          python3 -c "
          import json
          d = json.load(open('/tmp/pr.json'))
          for k in ['pr_number','head_sha','head_ref','title','hasCleanReview','hasQAPass','hasBlocking']:
            print(f'{k}={str(d.get(k,\"\")).lower()}')  " >> $GITHUB_OUTPUT

      - name: Check CI status
        if: steps.info.outputs.skip != 'true'
        id: ci
        uses: actions/github-script@v7
        with:
          result-encoding: json
          script: |
            const head_sha = '${{ steps.info.outputs.head_sha }}';
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: head_sha
            });

            if (checks.check_runs.length === 0) {
              return JSON.stringify({hasCI: false, allPassed: true, summary: 'No CI checks'});
            }

            const allCompleted = checks.check_runs.every(c => c.status === 'completed');
            const allPassed = checks.check_runs.every(c => c.conclusion === 'success');
            const failed = checks.check_runs.filter(c => c.conclusion === 'failure');
            const summary = checks.check_runs.map(c => `${c.name}: ${c.conclusion || c.status}`).join(', ');

            return JSON.stringify({hasCI: true, allCompleted, allPassed, failed: failed.map(c => c.name), summary});
          }

      - name: Run QA Agent (OpenAI API)
        if: steps.info.outputs.skip != 'true' && steps.info.outputs.hasBlocking != 'true'
        id: qa
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          CLEAN="${{ steps.info.outputs.hasCleanReview }}"
          CI_RESULT='${{ steps.ci.outputs.result }}'
          PR_NUMBER="${{ steps.info.outputs.pr_number }}"
          REPO="${{ github.repository }}"
          PR_TITLE="${{ steps.info.outputs.title }}"

          # Build the QA prompt
          PROMPT="You are ✅ QA Agent for Privé Perfumes. Respond with ONLY the QA comment, no other text.

          PR #${PR_NUMBER} in ${REPO}: ${PR_TITLE}

          Review status: $([ "$CLEAN" = "true" ] && echo "✅ Clean review posted" || echo "No clean review yet")
          CI status: ${CI_RESULT}

          Based on the CI and review status, write a QA comment.
          Format:
          - If CI all passed and review clean: '✅ QA Passed' with details
          - If CI failed: '✅ QA Failed' with the failing check names and a suggested fix
          - If no CI: '✅ QA Passed (review-only — no CI configured)'
          - If no clean review: '⏳ Waiting for 🔍 review before QA'

          Keep it under 200 words. Always start with ✅"

          # Call OpenAI API
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "
          import json, sys
          prompt = '''$PROMPT'''
          print(json.dumps({
            'model': 'gpt-4o',
            'messages': [{'role': 'user', 'content': prompt}],
            'max_tokens': 500,
            'temperature': 0.3
          }))")")

          QA_COMMENT=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'])" 2>/dev/null || echo "✅ QA check — could not reach agent, proceeding with CI result only")

          # Post QA comment
          gh issue comment "$PR_NUMBER" -R "$REPO" -b "$QA_COMMENT" 2>/dev/null || true

          # Determine if we can merge
          if echo "$QA_COMMENT" | grep -q "QA Passed"; then
            echo "can_merge=true" >> $GITHUB_OUTPUT
          else
            echo "can_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge PR
        if: >
          steps.qa.outputs.can_merge == 'true' &&
          steps.info.outputs.hasCleanReview == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.info.outputs.pr_number }}"
          REPO="${{ github.repository }}"
          TITLE="${{ steps.info.outputs.title }}"

          gh pr merge "$PR_NUMBER" -R "$REPO" --squash --delete-branch --subject "$TITLE"
          gh issue comment "$PR_NUMBER" -R "$REPO" -b "🔀 Auto-merged — review clean, QA passed, CI green."
